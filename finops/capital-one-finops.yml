description: 'FOCUS-aligned FinOps for Capital One DevExchange: partner-negotiated banking APIs billed
  through bilateral agreements rather than self-service usage tariffs.'
notes: Capital One does not publish a public API pricing or billing surface. Treat all billing as opaque
  partner-contract terms; reconcile against partnership invoice line items when available.
sources:
  - https://developer.capitalone.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Capital One Services, LLC
serviceCategory: Banking API
billingModel:
  pricingCategory: Custom Partner Agreement
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
focusColumns:
  ServiceName: Capital One DevExchange
  ServiceCategory: Banking API
  ProviderName: Capital One
  PublisherName: Capital One Services, LLC
  InvoiceIssuerName: Capital One Services, LLC
