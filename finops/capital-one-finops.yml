meters:
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - api
      - partner
  - name: contract_fee
    unit: month
    aggregation: sum
    dimensions:
      - partner
      - product
principles:
  - name: Visibility
    description: Visibility into request counts is provided through the partner DevExchange dashboard
      or bilateral reporting; no public usage API.
  - name: Allocation
    description: Allocation is by client_id (partner OAuth credential); for multi-product partners, tag
      requests with internal correlation IDs upstream.
  - name: Optimization
    description: Optimize by batching authorizations, caching reference data (e.g. credit offers), and
      negotiating volume terms at renewal.
  - name: Accountability
    description: Partnership owner holds the budget; quarterly business reviews with Capital One are typical.
