specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Capital One
providerId: capital-one
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Banking
  - DevExchange
  - Financial Services
  - Rate Limiting
description: Capital One does not publish per-API rate limits for the DevExchange portfolio. Limits are
  established per partner agreement; consult the partnership terms or DevExchange technical contact for
  specific values.
notes: No public rate-limit documentation found. Treat all limits as set by partnership contract; assume
  HTTP 429 throttling and OAuth 2.0 token-bound scoping.
sources:
  - https://developer.capitalone.com/
responseCodes:
  throttled: 429
limits:
  - name: Per-partner contract limit
    scope: partner
    metric: varies
    limit: see partnership agreement
    notes: Capital One sets request and concurrency caps per partner; not publicly documented.
policies:
  - name: OAuth 2.0 scoping
    description: All DevExchange APIs use OAuth 2.0; tokens are bound to a partner client_id which scopes
      rate-limit accounting.
  - name: Backoff strategy
    description: Honor 429 responses with exponential backoff; coordinate sustained traffic increases
      with the Capital One technical contact.
  - name: Production vs sandbox
    description: Sandbox environments are constrained more aggressively than production; do not load-test
      in sandbox.
maintainers:
  - FN: Kin Lane
    email: info@apievangelist.com
